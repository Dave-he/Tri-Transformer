version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    networks:
      - tri-transformer-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - VECTOR_DB_URL=http://vector_db:19530
    depends_on:
      vector_db:
        condition: service_started
    networks:
      - tri-transformer-net
    volumes:
      - ./data/documents:/app/data/documents
      - ./data/models:/app/data/models
      - ./backend/tritransformer.db:/app/tritransformer.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  vector_db:
    image: milvusdb/milvus:v2.3.3
    command: ["/bin/sh", "-c", "milvus run standalone"]
    ports:
      - "19532:19530"
    environment:
      - ETCD_USE_EMBED=true
      - COMMON_STORAGETYPE=local
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - tri-transformer-net

networks:
  tri-transformer-net:
    driver: bridge

volumes:
  milvus_data:
