    - "eval/pipeline/__init__.py - 补全导出"
    - "eval/tests/ - 补全 torch importorskip + 集成测试"
  out:
    - "eval/loss/ 算法实现（不修改）"
    - "eval/ground_truth/ 实现（不修改）"
    - "backend/ 模块"

