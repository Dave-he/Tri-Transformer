    operation: add
    description: "WebRTC 相关 TypeScript 类型定义"

  - path: frontend/src/types/trainingConfig.ts
    operation: add
    description: "训练配置相关类型（TrainingConfig, TrainingJob, TrainingProgress）"

  # ─── API 客户端 ──────────────────────────────────────
  - path: frontend/src/api/webrtc.ts
    operation: add
    description: "WebRTC 信令 API（sendOffer, sendCandidate, sendInterrupt）"

  - path: frontend/src/api/trainingConfig.ts
    operation: add
    description: "训练配置 API（startTraining, getProgress, getAvailableModels）"

  # ─── MSW Handlers ────────────────────────────────────
