    description: "训练配置 Mock（POST /training/start, GET /training/progress, GET /models/available）"

  - path: frontend/src/mocks/server.ts
    operation: modify
    description: "注册新增的 webrtcHandlers 和 trainingConfigHandlers"

  # ─── Zustand Stores ──────────────────────────────────
  - path: frontend/src/store/webrtcStore.ts
    operation: add
    description: "WebRTC 状态机（RTCPeerConnection 生命周期管理）"

  - path: frontend/src/store/trainingConfigStore.ts
    operation: add
    description: "训练配置状态（config / job / progress / polling）"

  # ─── 对话组件（WebRTC 相关） ──────────────────────────
  - path: frontend/src/components/chat/ChatModeTabs.tsx
    operation: add
    description: "对话模态切换 Tab（text / audio / video）"

  - path: frontend/src/components/chat/WebRTCControls.tsx
    operation: add
    description: "WebRTC 控制面板（开始/结束/打断按钮 + 风格滑块）"

  - path: frontend/src/components/chat/AudioVisualizer.tsx
    operation: add
    description: "音频波形可视化（Canvas + AnalyserNode）"

  - path: frontend/src/pages/ChatPage.tsx
    operation: modify
    description: "集成 ChatModeTabs，语音/视频模式渲染 WebRTCControls + AudioVisualizer"

  # ─── 训练配置组件 ─────────────────────────────────────
  - path: frontend/src/components/training/ModelPluginSelector.tsx
    operation: add
    description: "I/O 端底座模型选择（Select + 自定义 Model ID 输入）"

  - path: frontend/src/components/training/TrainingConfigForm.tsx
    operation: add
    description: "训练超参配置表单（lr / batch_size / max_steps / phase）"

  - path: frontend/src/pages/TrainingPage.tsx
    operation: modify
    description: "集成 ModelPluginSelector + TrainingConfigForm，展示训练进度"

  # ─── 测试文件 ─────────────────────────────────────────
  - path: frontend/src/store/__tests__/webrtcStore.test.ts
    operation: add
    description: "webrtcStore 单元测试（状态机流转、API 调用 Mock）"

  - path: frontend/src/store/__tests__/trainingConfigStore.test.ts
    operation: add
    description: "trainingConfigStore 单元测试（startTraining、fetchProgress、轮询）"

  - path: frontend/src/api/__tests__/webrtc.test.ts
    operation: add
    description: "WebRTC API 单元测试（信令请求格式验证）"

  - path: frontend/src/components/chat/__tests__/WebRTCControls.test.tsx
    operation: add
    description: "WebRTCControls 组件测试（按钮状态、事件回调）"

  - path: frontend/src/components/chat/__tests__/AudioVisualizer.test.tsx
    operation: add
    description: "AudioVisualizer 组件测试（Canvas 渲染、AudioContext Mock）"

  - path: frontend/src/components/chat/__tests__/ChatModeTabs.test.tsx
    operation: add
    description: "ChatModeTabs 组件测试（Tab 切换、模态渲染）"

  - path: frontend/src/components/training/__tests__/ModelPluginSelector.test.tsx
    operation: add
    description: "ModelPluginSelector 组件测试（选项渲染、自定义输入）"

  - path: frontend/src/components/training/__tests__/TrainingConfigForm.test.tsx
    operation: add
    description: "TrainingConfigForm 组件测试（表单验证、提交回调）"

api_changes:
  new_endpoints:
    - method: POST
      path: /api/v1/webrtc/offer
      request: "{ sdp: string, type: 'offer' }"
      response: "{ sdp: string, type: 'answer' }"
    - method: POST
      path: /api/v1/webrtc/candidate
      request: "{ candidate: RTCIceCandidateInit }"
      response: "{ ok: true }"
    - method: POST
      path: /api/v1/webrtc/interrupt
      request: "{}"
      response: "{ ok: true }"
    - method: POST
      path: /api/v1/training/start
      request: "{ i_model_id: string, o_model_id: string, learning_rate: number, batch_size: number, max_steps: number, phase: 0|1|2 }"
      response: "{ jobId: string }"
    - method: GET
      path: /api/v1/training/progress
      response: "{ jobId: string, phase: number, step: number, maxSteps: number, loss: number, lr: number, status: 'running'|'completed'|'failed' }"
    - method: GET
      path: /api/v1/models/available
      response: "{ models: Array<{ id: string, name: string, type: 'input'|'output' }> }"

testing_strategy:
  webrtc_mock: |
    vi.stubGlobal('RTCPeerConnection', vi.fn().mockImplementation(() => ({
      createOffer: vi.fn().mockResolvedValue({ type: 'offer', sdp: 'mock_sdp' }),
      setLocalDescription: vi.fn().mockResolvedValue(undefined),
      setRemoteDescription: vi.fn().mockResolvedValue(undefined),
      addIceCandidate: vi.fn().mockResolvedValue(undefined),
      close: vi.fn(),
      onicecandidate: null,
      ontrack: null,
    })))
  audio_context_mock: |
    vi.stubGlobal('AudioContext', vi.fn().mockImplementation(() => ({
      createAnalyser: vi.fn().mockReturnValue({ connect: vi.fn(), disconnect: vi.fn(), fftSize: 2048, getByteTimeDomainData: vi.fn() }),
      createMediaStreamSource: vi.fn().mockReturnValue({ connect: vi.fn() }),
      close: vi.fn(),
    })))
  media_devices_mock: |
    Object.defineProperty(navigator, 'mediaDevices', {
      writable: true,
      value: {
        getUserMedia: vi.fn().mockResolvedValue({ getTracks: () => [] })
      }
    })

reusable_assets:
  - feature: "训练配置轮询"
    existing_asset: "useMetricsStore.fetchStatus"
    file_path: "frontend/src/store/metricsStore.ts"
    reuse_method: "组合（参考 setInterval 模式）"
    forbidden_direct_calls:
      - none
  - feature: "MSW handler 注册"
    existing_asset: "server.ts setupServer pattern"
    file_path: "frontend/src/mocks/server.ts"
    reuse_method: "扩展（新增 handlers 注册）"
    forbidden_direct_calls:
      - none

risks:
  - id: RISK-V2-001
    description: "WebRTC jsdom 不完整，测试需完善 Mock"
    severity: P1
    mitigation: "vi.stubGlobal 模拟 RTCPeerConnection + navigator.mediaDevices"
  - id: RISK-V2-002
    description: "AudioContext jsdom 不支持"
    severity: P1
    mitigation: "vi.stubGlobal 模拟 AudioContext"
  - id: RISK-V2-003
    description: "ChatPage 修改可能破坏现有 v1 测试"
    severity: P2
    mitigation: "仅在现有 JSX 外层包 Tab，不修改现有子组件逻辑"

