      description: "WebRTC 状态机流转正确"
    - id: AC-V2-002
      test: "vitest run src/components/chat/__tests__/AudioVisualizer.test.tsx"
      description: "音频波形组件 Canvas Mock 渲染"
    - id: AC-V2-003
      test: "vitest run src/store/__tests__/trainingConfigStore.test.ts"
      description: "训练配置 Store 功能"
    - id: AC-V2-004
      test: "vitest run src/components/training/__tests__/ModelPluginSelector.test.tsx"
      description: "模型插件选择组件"
    - id: AC-V2-005
      test: "vitest run src/components/training/__tests__/TrainingConfigForm.test.tsx"
      description: "训练配置表单验证与提交"
    - id: AC-V2-006
      test: "vitest run src/components/chat/__tests__/ChatModeTabs.test.tsx"
      description: "ChatPage 模态切换"
    - id: AC-V2-007
      test: "vitest run src/components/chat/__tests__/WebRTCControls.test.tsx"
