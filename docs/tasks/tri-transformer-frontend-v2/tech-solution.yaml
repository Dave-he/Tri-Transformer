      description: "全量测试无回归（含 v1 54个用例）"

commands:
  test: "cd frontend && npx vitest run"
  typecheck: "cd frontend && npx tsc --noEmit"
  lint_incremental: "cd frontend && git diff --name-only HEAD | grep -E '\\.(ts|tsx)$' | xargs npx eslint --max-warnings 0"
