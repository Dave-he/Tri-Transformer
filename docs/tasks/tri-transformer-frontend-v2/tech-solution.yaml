meta:
  title: "Tri-Transformer 前端 v2 - WebRTC 全双工交互 + 训练配置平台化"
  task_id: tri-transformer-frontend-v2
  platform: web
  created_at: "2026-03-27"
  requirement_version: "2"
  requirement_confidence: "medium-high"
  base_task: tri-transformer-frontend

scope:
  in_scope:
    - "WebRTC 信令状态机（Zustand webrtcStore）"
    - "ChatPage 模态切换 Tab（文本/语音/视频）"
    - "WebRTC 推流组件（getUserMedia + RTCPeerConnection）"
    - "音频波形可视化（Web Audio API AnalyserNode）"
    - "打断按钮与风格切换滑块（data channel）"
    - "训练配置 Store（trainingConfigStore）"
    - "大模型插件选择组件（ModelPluginSelector）"
    - "训练超参配置表单（TrainingConfigForm）"
    - "MSW Mock 新增信令 + 训练配置 handlers"
    - "新增 TypeScript 类型（WebRTC + 训练配置）"
  out_of_scope:
    - "后端 aiortc 信令服务器"
    - "实际 WebRTC TURN/STUN 服务器"
    - "训练脚本 DeepSpeed DDP"

architecture:
  webrtc_flow: |
    Browser → getUserMedia(mic/camera)
    → RTCPeerConnection.createOffer()
    → POST /api/v1/webrtc/offer → SDP answer
    → setRemoteDescription(answer)
    → onicecandidate → POST /api/v1/webrtc/candidate
    ← media stream track (ontrack)
    → 打断: POST /api/v1/webrtc/interrupt

  webrtc_state_machine:
    states: [idle, requesting_media, connecting, connected, disconnected, error]
    transitions:
      - from: idle
        to: requesting_media
        trigger: startCall()
      - from: requesting_media
        to: connecting
        trigger: getUserMedia 成功
      - from: connecting
        to: connected
        trigger: ontrack 事件
      - from: connected
        to: disconnected
        trigger: endCall() / oniceconnectionstatechange=disconnected
      - from: "*"
        to: error
        trigger: 任意异常

  training_config_flow: |
    用户选择 i_model_id / o_model_id
    → 配置超参 (lr, batch_size, max_steps, phase)
    → POST /api/v1/training/start → { jobId }
    → 每 5s 轮询 GET /api/v1/training/progress
    → 更新 loss/lr 曲线

