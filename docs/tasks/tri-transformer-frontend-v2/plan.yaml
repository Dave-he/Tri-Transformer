plan:
  meta:
    task_id: tri-transformer-frontend-v2
    source_tech_doc: "docs/tasks/tri-transformer-frontend-v2/tech-solution.yaml"
    scope: "P0|P1"
    test_coverage_target: 80
    min_tests_per_feature: 3
    platform: web
    created_at: "2026-03-27"

  tasks:
    # ─── 类型定义 ─────────────────────────────────────────────
    - id: T1-1
      priority: P0
      type: test
      title: "验证 WebRTC 类型定义完整性"
      test_type: pure
      file: "frontend/src/types/__tests__/api.test.ts"
      given: "WebRTC 类型定义文件存在"
      when: "TypeScript 编译检查"
      then:
        - "WebRTCConnectionState 联合类型正确定义"
        - "SignalOffer / SignalAnswer / SignalCandidate 类型完整"
        - "WebRTCState store 类型完整（包含 connectionState / stream / error）"
      depends_on: []

    - id: P0-1
      priority: P0
      type: code
      title: "新增 WebRTC 与训练配置 TypeScript 类型"
      files:
        - "frontend/src/types/webrtc.ts"
        - "frontend/src/types/trainingConfig.ts"
      depends_on: [T1-1]
      definition_of_done:
        - "WebRTCConnectionState 联合类型（idle/requesting_media/connecting/connected/disconnected/error）"
        - "RTCSignalOffer / RTCSignalAnswer / RTCSignalCandidate 接口"
        - "WebRTCState（Zustand store 类型）"
        - "TrainingConfig、TrainingJob、TrainingProgress、AvailableModel 类型"
        - "所有类型有 readonly 修饰符"

    # ─── API 客户端 ───────────────────────────────────────────
    - id: T2-1
      priority: P0
      type: test
      title: "为 WebRTC API 客户端编写单元测试"
      test_type: pure
      file: "frontend/src/api/__tests__/webrtc.test.ts"
      given: "MSW Mock 已配置 WebRTC handlers"
      when: "调用 sendOffer / sendCandidate / sendInterrupt"
      then:
        - "sendOffer 发送 POST /webrtc/offer 并返回 SDP answer"
        - "sendCandidate 发送 POST /webrtc/candidate"
        - "sendInterrupt 发送 POST /webrtc/interrupt"
      depends_on: [P0-1]

    - id: P0-2
      priority: P0
      type: code
      title: "实现 WebRTC + 训练配置 API 客户端"
      files:
        - "frontend/src/api/webrtc.ts"
        - "frontend/src/api/trainingConfig.ts"
      depends_on: [T2-1]
      definition_of_done:
        - "sendOffer(sdp) → POST /api/v1/webrtc/offer"
        - "sendCandidate(candidate) → POST /api/v1/webrtc/candidate"
        - "sendInterrupt() → POST /api/v1/webrtc/interrupt"
        - "startTraining(config) → POST /api/v1/training/start → { jobId }"
        - "getTrainingProgress() → GET /api/v1/training/progress"
        - "getAvailableModels() → GET /api/v1/models/available"
        - "复用现有 apiClient 实例（含 JWT 拦截器）"

    # ─── MSW Mock Handlers ────────────────────────────────────
    - id: T3-1
      priority: P0
      type: test
      title: "验证 WebRTC + 训练配置 MSW handlers 正确拦截"
      test_type: pure
      file: "frontend/src/mocks/__tests__/handlers.test.ts"
      given: "MSW server 已注册新 handlers"
      when: "发起 WebRTC 信令和训练配置 API 请求"
      then:
        - "POST /webrtc/offer 返回 SDP answer 对象"
        - "POST /training/start 返回 { jobId: 'test-job-1' }"
        - "GET /training/progress 返回 progress 对象"
        - "GET /models/available 返回 models 数组"
      depends_on: [P0-2]

    - id: P0-3
      priority: P0
      type: code
      title: "实现 WebRTC + 训练配置 MSW handlers 并注册"
      files:
        - "frontend/src/mocks/handlers/webrtc.ts"
        - "frontend/src/mocks/handlers/trainingConfig.ts"
        - "frontend/src/mocks/server.ts"
      depends_on: [T3-1]
      definition_of_done:
        - "webrtcHandlers：覆盖 offer / candidate / interrupt 3 个端点"
        - "trainingConfigHandlers：覆盖 start / progress / models 3 个端点"
        - "server.ts 注册新 handlers（不破坏现有 handlers）"
        - "Mock 数据格式与 API types 一致"

    # ─── WebRTC Store ─────────────────────────────────────────
    - id: T4-1
      priority: P0
      type: test
      title: "为 webrtcStore 编写单元测试（状态机流转）"
      test_type: pure
      file: "frontend/src/store/__tests__/webrtcStore.test.ts"
      given: "RTCPeerConnection / navigator.mediaDevices 已 Mock"
      when: "调用 startCall / endCall / reset actions"
      then:
        - "startCall → connectionState 从 idle 到 requesting_media 到 connecting"
        - "endCall → connectionState 变为 disconnected，close() 被调用"
        - "reset → connectionState 恢复 idle，stream 为 null"
        - "sendInterrupt → 调用 POST /webrtc/interrupt API"
        - "getUserMedia 失败 → connectionState 为 error，error 字段有值"
      depends_on: [P0-3]

    - id: P0-4
      priority: P0
      type: code
      title: "实现 webrtcStore（RTCPeerConnection 状态机）"
      files:
        - "frontend/src/store/webrtcStore.ts"
      depends_on: [T4-1]
      definition_of_done:
        - "connectionState 状态机（idle/requesting_media/connecting/connected/disconnected/error）"
        - "startCall: getUserMedia → createOffer → sendOffer → setRemoteDescription"
        - "onicecandidate 监听并调用 sendCandidate"
        - "ontrack 监听并更新 remoteStream"
        - "endCall: close RTCPeerConnection，更新状态"
        - "sendInterrupt: 调用 sendInterrupt API"
        - "reset: 清空所有状态"

    # ─── 训练配置 Store ───────────────────────────────────────
    - id: T5-1
      priority: P0
      type: test
      title: "为 trainingConfigStore 编写单元测试"
      test_type: pure
      file: "frontend/src/store/__tests__/trainingConfigStore.test.ts"
      given: "MSW Mock 已配置训练配置 handlers"
      when: "调用 startTraining / fetchProgress / fetchAvailableModels"
      then:
        - "startTraining 调用 POST /training/start 并设置 currentJobId"
        - "fetchProgress 更新 progress 状态"
        - "fetchAvailableModels 更新 availableModels 列表"
        - "startTraining 失败后 error 状态设置，loading 恢复 false"
        - "setConfig 正确更新训练配置字段"
      depends_on: [P0-3]

    - id: P0-5
      priority: P0
      type: code
      title: "实现 trainingConfigStore"
      files:
        - "frontend/src/store/trainingConfigStore.ts"
      depends_on: [T5-1]
      definition_of_done:
        - "config 状态（i_model_id / o_model_id / learning_rate / batch_size / max_steps / phase）"
        - "setConfig action"
        - "startTraining: POST /training/start → 存储 currentJobId"
        - "fetchProgress: GET /training/progress → 更新 progress"
        - "fetchAvailableModels: GET /models/available → 更新 availableModels"
        - "loading / error 状态管理"

    # ─── WebRTC 控制组件 ──────────────────────────────────────
    - id: T6-1
      priority: P0
      type: test
      title: "为 WebRTCControls 组件编写测试"
      test_type: component
      file: "frontend/src/components/chat/__tests__/WebRTCControls.test.tsx"
      given: "WebRTCControls 渲染，connectionState 为 idle"
      when: "点击「开始通话」按钮"
      then:
        - "onStartCall 回调被触发"
        - "connectionState 为 connected 时显示「结束通话」按钮"
        - "connectionState 为 connected 时「打断」按钮可用"
        - "onInterrupt 回调在打断按钮点击时触发"
        - "风格滑块 onChange 回调在值变化时触发"
      depends_on: [P0-4]

    - id: P0-6
      priority: P0
      type: code
      title: "实现 WebRTCControls 组件"
      files:
        - "frontend/src/components/chat/WebRTCControls.tsx"
      depends_on: [T6-1]
      definition_of_done:
        - "connectionState 驱动按钮状态（idle: 「开始通话」; connected: 「结束通话」+「打断」）"
        - "风格切换滑块（Ant Design Slider，0-100，调节「正式度」）"
        - "连接状态 Badge 展示（idle/connecting/connected/error 对应不同颜色）"
        - "所有交互回调通过 props 传入"

    # ─── AudioVisualizer 组件 ─────────────────────────────────
    - id: T7-1
      priority: P0
      type: test
      title: "为 AudioVisualizer 组件编写测试"
      test_type: component
      file: "frontend/src/components/chat/__tests__/AudioVisualizer.test.tsx"
      given: "AudioContext 已 Mock，组件接收 MediaStream"
      when: "渲染 AudioVisualizer 组件"
      then:
        - "有 stream 时渲染 canvas 元素"
        - "无 stream 时显示占位符"
        - "stream 变化时重新创建 AudioContext"
        - "组件卸载时调用 AudioContext.close()"
      depends_on: [P0-4]

    - id: P0-7
      priority: P0
      type: code
      title: "实现 AudioVisualizer 组件"
      files:
        - "frontend/src/components/chat/AudioVisualizer.tsx"
      depends_on: [T7-1]
      definition_of_done:
        - "接收 stream: MediaStream | null prop"
        - "有 stream 时：创建 AudioContext → AnalyserNode → requestAnimationFrame 绘制波形"
        - "无 stream 时：显示「等待音频流...」占位符"
        - "useEffect 清理：cancelAnimationFrame + AudioContext.close()"
        - "Canvas 宽度自适应容器"

    # ─── ChatModeTabs 组件 ────────────────────────────────────
    - id: T8-1
      priority: P0
      type: test
      title: "为 ChatModeTabs 组件编写测试"
      test_type: component
      file: "frontend/src/components/chat/__tests__/ChatModeTabs.test.tsx"
      given: "ChatModeTabs 渲染"
      when: "切换 Tab"
      then:
        - "默认展示 text Tab 内容（children prop）"
        - "点击 audio Tab 展示 audio 模式内容"
        - "点击 video Tab 展示 video 模式内容"
        - "onModeChange 回调在 Tab 切换时触发，参数正确"
      depends_on: [P0-6, P0-7]

    - id: P0-8
      priority: P0
      type: code
      title: "实现 ChatModeTabs 组件并集成到 ChatPage"
      files:
        - "frontend/src/components/chat/ChatModeTabs.tsx"
        - "frontend/src/pages/ChatPage.tsx"
      depends_on: [T8-1]
      definition_of_done:
        - "Ant Design Tabs（text/audio/video 三个 Tab）"
        - "text Tab：渲染 children（现有 MessageList + ChatInput，不改动）"
        - "audio Tab：渲染 AudioVisualizer + WebRTCControls"
        - "video Tab：渲染 <video> 元素 + WebRTCControls"
        - "ChatPage 集成 ChatModeTabs，WebRTC 交互通过 webrtcStore"
        - "现有 v1 测试不受影响（Text Tab 为默认）"

    # ─── 大模型插件选择组件 ───────────────────────────────────
    - id: T9-1
      priority: P0
      type: test
      title: "为 ModelPluginSelector 编写测试"
      test_type: component
      file: "frontend/src/components/training/__tests__/ModelPluginSelector.test.tsx"
      given: "ModelPluginSelector 渲染，availableModels 有数据"
      when: "选择预设模型或输入自定义 Model ID"
      then:
        - "预设模型列表正确渲染为 Select 选项"
        - "onIModelChange 在 I 端选择变化时触发"
        - "onOModelChange 在 O 端选择变化时触发"
        - "自定义输入 Model ID 触发对应 onChange"
        - "清空 Select 时 onChange 传 undefined"
      depends_on: [P0-5]

    - id: P0-9
      priority: P0
      type: code
      title: "实现 ModelPluginSelector 组件"
      files:
        - "frontend/src/components/training/ModelPluginSelector.tsx"
      depends_on: [T9-1]
      definition_of_done:
        - "I 端（输入侧）底座模型选择：Select + 自定义输入"
        - "O 端（输出侧）底座模型选择：Select + 自定义输入"
        - "预设模型来自 availableModels prop（API 返回）"
        - "支持直接输入 HuggingFace Model ID（Input 文本框）"
        - "onChange 回调分别接收 i_model_id / o_model_id"

    # ─── 训练配置表单 ─────────────────────────────────────────
    - id: T10-1
      priority: P0
      type: test
      title: "为 TrainingConfigForm 编写测试"
      test_type: component
      file: "frontend/src/components/training/__tests__/TrainingConfigForm.test.tsx"
      given: "TrainingConfigForm 渲染"
      when: "填写表单并点击提交"
      then:
        - "learning_rate 为空时显示验证错误"
        - "learning_rate 不在合法范围（1e-6 ~ 0.1）时显示错误"
        - "表单验证通过后 onSubmit 回调触发，参数正确"
        - "loading 为 true 时提交按钮 disabled"
        - "phase 选择 0/1/2 均可正常提交"
      depends_on: [P0-5]

    - id: P0-10
      priority: P0
      type: code
      title: "实现 TrainingConfigForm 并集成到 TrainingPage"
      files:
        - "frontend/src/components/training/TrainingConfigForm.tsx"
        - "frontend/src/pages/TrainingPage.tsx"
      depends_on: [T10-1]
      definition_of_done:
        - "Ant Design Form（learning_rate / batch_size / max_steps / phase 字段）"
        - "表单验证规则（learning_rate: 1e-6~0.1 / batch_size: 1~256 / max_steps: 1~100000）"
        - "phase 选择（0: 缝合层热启动 / 1: 模态对齐 / 2: 控制约束训练）"
        - "提交回调 onSubmit(config: TrainingConfig)"
        - "TrainingPage 集成 ModelPluginSelector + TrainingConfigForm + 训练进度轮询"
        - "启动训练后 5s 轮询 GET /training/progress"

  commands:
    test: "cd frontend && npx vitest run"
    lint: "cd frontend && git diff --name-only HEAD | grep -E '\\.(ts|tsx)$' | xargs npx eslint --max-warnings 0"
    typecheck: "cd frontend && npx tsc --noEmit"
    build: "cd frontend && npm run build"

  acceptance:
    - id: AC-V2-001
      description: "WebRTC 状态机流转"
      test: "cd frontend && npx vitest run src/store/__tests__/webrtcStore.test.ts"
    - id: AC-V2-003
      description: "训练配置表单提交"
      test: "cd frontend && npx vitest run src/components/training/__tests__/TrainingConfigForm.test.tsx"
    - id: AC-V2-005
      description: "WebRTC connectionState 流转"
      test: "cd frontend && npx vitest run src/store/__tests__/webrtcStore.test.ts"
    - id: AC-V2-007
      description: "训练 Store 功能"
      test: "cd frontend && npx vitest run src/store/__tests__/trainingConfigStore.test.ts"
    - id: AC-V2-008
      description: "全量测试无回归"
      test: "cd frontend && npx vitest run"

  rollback:
    - "WebRTC 相关文件均为新增，回退直接删除新增文件"
    - "ChatPage.tsx / TrainingPage.tsx 可通过 git revert 回退"
    - "mocks/server.ts 仅新增 import，影响极小"
