task_id: tri-transformer-backend-v2
task_type: backend
platform: python
framework: fastapi
document: "docs/sub_prds/01_model_skeleton_and_pluggable_llm.md + 02_multimodal_tokenizer_and_streaming_engine.md + 03_realtime_multimodal_rag_and_hallucination_control.md + 04_training_pipeline_and_full_duplex_frontend.md"
created_at: "2026-03-27"
predecessor_task: tri-transformer-backend

title: "Tri-Transformer 后端增量开发 v2"
description: |
  在已有 FastAPI 后端基础上（80 tests passing），按最新 sub_prds 01~04
  实现四个核心增量模块：
  1. 双端大模型插拔系统（PluggableLLMAdapter + HFModelLoader）
  2. 多模态统一 Tokenizer（文本/音频/视觉 统一 Token 空间）
  3. 流式推理 WebSocket 端点（Streaming Engine）
  4. 幻觉阻断服务（FactChecker + C-Transformer 干预）

scope: backend_only
out_of_scope:
  - 前端 WebRTC 通道（单独任务）
  - 真实 GPU 训练（DeepSpeed 脚本阶段 2/3 训练）
  - Docker 部署配置

baseline_status:
  tests_passing: 80
  coverage: 76%
  existing_modules:
    - FastAPI auth/chat/knowledge/model/train API
    - RAG engine (ChromaVectorStore + HybridRetriever)
    - MockInferenceService
    - TriTransformerModel + TriTransformerTrainer
    - JWT 认证 + 多租户隔离

functional_requirements:
  - id: FR-101
    module: 双端大模型插拔
    title: HuggingFace 模型权重动态加载
    description: |
      根据配置字典从 HF Hub 或本地路径加载大模型 A（I端）和大模型 B（O端）的权重，
      映射到 ITransformer/OTransformer 对应层，支持 LoRA 旁路注入与权重冻结。
    priority: P0
    acceptance_criteria:
      - HFModelLoader 能根据 model_id 加载 HuggingFace transformers 模型
      - PluggableLLMAdapter 能将外部模型权重映射到 I/O 分支（按层数截取）
      - 支持 freeze_base=True 冻结底座权重，仅训练 LoRA 旁路
      - LoraAdapter 注入后前向传播不出错，梯度可反传
      - 无 GPU 环境下可用 cpu_only 模式加载（4-bit/8-bit 量化可选）
      - 单元测试：Mock HF 模型权重映射后 forward pass 不出错

  - id: FR-102
    module: 多模态 Tokenizer
    title: 统一 Any-to-Any Token 空间
    description: |
      实现文本 BPE（复用大模型词表）、音频 Neural Codec（SNAC/EnCodec 适配器）、
      视觉 VQ（SigLIP + VQ-GAN 适配器）的统一离散 Token 空间映射。
      所有模态 Token 映射到连续 input_ids 序列不越界。
    priority: P0
    acceptance_criteria:
      - TextTokenizer 封装 HF tokenizer，输出 input_ids
      - AudioTokenizer Mock 模式将音频帧→离散 Token ID（范围 130000~134000）
      - VisionTokenizer Mock 模式将视频帧→视觉 Token ID（范围 135000~145000）
      - UnifiedTokenizer.encode() 将混合模态输入合并为单一 input_ids 序列
      - 特殊 Token 注册：<|audio_start|> <|vision_start|> <|interrupt|>
      - 单元测试：混合编码不越界，各模态 Token ID 区间互不重叠

  - id: FR-103
    module: 流式推理引擎
    title: WebSocket 流式推理端点
    description: |
      实现 /api/v1/model/stream 的 WebSocket 端点，接受实时多模态 chunk，
      维护 I 侧 KV-Cache 状态，驱动 O 侧自回归输出并实时推流给客户端。
    priority: P0
    acceptance_criteria:
      - GET /api/v1/model/stream WebSocket 端点可建立连接
      - 客户端发送 JSON {"type":"text","content":"..."} 消息触发流式推理
      - 服务端逐 Token 返回 {"token":"...","done":false} 流式消息
      - 结束时返回 {"done":true,"sources":[...]}
      - 支持 {"type":"interrupt"} 消息立即中止当前生成
      - Mock 模式下 WebSocket 流式响应测试通过
      - 单元测试验证连接/消息/打断/关闭完整生命周期

  - id: FR-104
    module: 幻觉阻断
    title: 事实一致性校验与生成干预
    description: |
      FactChecker 服务：对比生成内容与 RAG 检索知识的语义一致性，
      当检测到明显偏离时通过 C-Transformer 控制信号抑制生成方向。
    priority: P1
    acceptance_criteria:
      - FactChecker.check(generated_text, rag_contexts) 返回一致性分数 [0,1]
      - 一致性分数 < 阈值（默认 0.3）时返回 HallucinationDetected 标志
      - POST /api/v1/chat/sessions/{id}/messages 响应包含 hallucination_detected 字段
      - Mock 模式下覆盖干预路径的单元测试通过
      - 不影响已有 80 个测试

non_functional_requirements:
  - 流式 WebSocket 首 Token 延迟 < 500ms（Mock 模式）
  - LoRA 注入后模型参数量增加 < 5%
  - 多模态 Token encode/decode 往返一致性 > 99%
  - 所有新增代码覆盖率 >= 80%
  - 不破坏已有 80 个测试

tech_stack:
  language: python
  framework: fastapi
  hf_integration: transformers>=4.40 peft>=0.10
  audio_codec: snac（Mock 适配器）
  vision_tokenizer: pillow（Mock 适配器）
  websocket: fastapi WebSocket
  fact_checking: cosine_similarity（sentence_transformers）
  testing: pytest_asyncio

quality_gate:
  verdict: PASS
  blockers: []
  warnings:
    - "真实 HF 模型权重较大，单元测试使用 Mock 小型模型（d_model=64）"
    - "SNAC/EnCodec 为 Mock 实现，真实音频 Codec 需单独集成"
    - "WebSocket 测试需使用 httpx WebSocketTestSession 或 Starlette TestClient"
