  predecessor_task: tri-transformer-backend
  baseline_tests: 157

tech_stack:
  language: python
  python_version: "3.11"
  framework: fastapi
  pluggable_llm: pytorch nn.Module (TransformerEncoder backbone)
  lora: custom LoraAdapter (A/B 矩阵 + alpha scaling)
  tokenizer_audio: mock (SNAC 适配器接口预留)
  tokenizer_vision: mock (VQ-GAN 适配器接口预留，支持 PIL Image)
  websocket: fastapi_native_websocket
  fact_checking: cosine_similarity_mock (random embedding + cache)
  testing: pytest_asyncio

file_changes:
  # FR-101: 双端大模型插拔
  - path: backend/app/model/lora_adapter.py
    action: modify
    status: implemented
    description: "新增 alpha 参数支持标准 LoRA scaling (scaling=alpha/rank)；新增 weight/bias 属性访问器"

  - path: backend/app/model/pluggable_llm.py
    action: modify
    status: implemented
    description: "新增独立 TransformerEncoder 类；PluggableLLMAdapter 重构为 backbone-based 架构；inject_lora 改为方法调用；forward 兼容无 mask 调用"

  # FR-102: 多模态 Tokenizer
  - path: backend/app/model/tokenizer/__init__.py
    action: modify
    status: implemented
    description: "导出调整"

  - path: backend/app/model/tokenizer/unified_tokenizer.py
    action: modify
    status: implemented
    description: "ModalInput dataclass 上移，data 类型放宽为 Any；encode_mixed 支持 ModalInput 对象和 (modality,data) 元组；新增 token_to_id()"

  - path: backend/app/model/tokenizer/vision_tokenizer.py
    action: modify
    status: implemented
    description: "新增 _to_bytes() 方法支持 PIL.Image 自动序列化；encode() 支持批量图像输入 (list)"

  # FR-103: 流式推理 WebSocket 端点
  - path: backend/app/services/model/stream_engine.py
    action: modify
    status: implemented
    description: "新增 _interrupt_event 实例级状态管理；generate() 返回类型改为 dict；支持 max_tokens；interrupt 检测更完整"

  - path: backend/app/api/v1/stream.py
    action: add
    status: existing
    description: "WebSocket 路由 /api/v1/model/stream: 连接/鉴权/text消息流/interrupt/关闭全生命周期"

  # FR-104: 幻觉阻断服务
  - path: backend/app/schemas/chat.py
    action: modify
    status: implemented
    description: "MessageResponse 新增 hallucination_detected: bool = False 字段"

  - path: backend/app/api/v1/chat.py
    action: modify
    status: implemented
    description: "send_message 响应包含 hallucination_detected 字段"

  # 测试文件
  - path: backend/tests/test_pluggable_llm.py
    action: modify
    status: implemented
    description: "TestLoraAdapter (3) + TestPluggableLLMAdapter (3) — 使用 backbone-based 新接口"

  - path: backend/tests/test_tokenizer.py
    action: modify
    status: implemented
    description: "TestTextTokenizer/Audio/Vision/UnifiedTokenizer (6) — 验证 Token 区间不重叠"

  - path: backend/tests/test_stream.py
    action: modify
    status: implemented
    description: "TestStreamingEngine (2) + TestWebSocketEndpoint (5) — 连接/流/打断/关闭生命周期"

  - path: backend/tests/test_fact_checker.py
    action: modify
    status: implemented
    description: "TestFactChecker (4) + TestChatHallucinationField (2) — 幻觉检测+对话响应字段验证"

