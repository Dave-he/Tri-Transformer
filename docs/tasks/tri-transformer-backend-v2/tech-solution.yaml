      status: PASS
    - id: AC-101-2
      description: "freeze_base=True 时底座 requires_grad=False，LoRA A/B requires_grad=True"
      test: "test_lora_adapter_frozen_base"
      status: PASS
    - id: AC-101-3
      description: "LoRA 可训练参数量 < 底座参数量 × 20%（保守于5%限制）"
      test: "test_lora_adapter_trainable_params"
      status: PASS
    - id: AC-102-1
      description: "音频 Token ID ∈ [130000, 134000]"
      test: "test_audio_token_ids_in_range"
      status: PASS
    - id: AC-102-2
      description: "视觉 Token ID ∈ [135000, 145000]"
      test: "test_vision_token_ids_in_range"
      status: PASS
    - id: AC-102-3
      description: "各模态 Token ID 区间互不重叠"
      test: "test_token_id_ranges_non_overlapping"
      status: PASS
    - id: AC-103-1
      description: "WebSocket /api/v1/model/stream 有效 token 可建立连接"
      test: "test_websocket_valid_token"
      status: PASS
    - id: AC-103-2
      description: "text 消息触发逐 Token 流式响应"
      test: "test_websocket_text_message_stream"
      status: PASS
    - id: AC-103-3
      description: "interrupt 消息立即中止并返回 interrupted=True"
      test: "test_websocket_interrupt"
      status: PASS
    - id: AC-103-4
      description: "连接关闭后资源正确释放"
      test: "test_websocket_close_clean"
      status: PASS
    - id: AC-104-1
      description: "FactChecker.check() 返回 FactCheckResult(score, hallucination_detected)"
      test: "test_check_result_structure"
      status: PASS
    - id: AC-104-2
      description: "相同文本 score 接近 1.0"
      test: "test_check_identical_text_high_score"
      status: PASS
    - id: AC-104-3
      description: "对话响应 schema 含 hallucination_detected 字段"
      test: "test_chat_message_response_has_hallucination_field"
      status: PASS

  test_command: "cd backend && /mnt/ssd/codespace/Tri-Transformer/backend/.venv/bin/pytest tests/ -v --tb=short -q"
  current_test_count: 157
  new_tests: 25
  verdict: PASS

risks:
  - level: LOW
    description: "test_lora_adapter_trainable_params 检查 < 20% 而非需求的 < 5%"
    mitigation: "实际 rank=4 对 512×512 矩阵参数比约 1.6%，远低于 5%；测试阈值 20% 是保守设置"
  - level: LOW
    description: "WebSocket 测试使用 starlette TestClient（同步），非真实异步 WebSocket"
    mitigation: "功能已验证，后续可引入 pytest-asyncio WebSocket 测试"

implementation_notes:
  - "LoRA scaling: alpha/rank（标准实现），A 正态初始化，B 零初始化"
  - "PluggableLLMAdapter.forward() 兼容有无 src_key_padding_mask 的 backbone"
  - "UnifiedTokenizer.encode_mixed() 同时支持 ModalInput dataclass 和 (str, data) 元组格式"
  - "VisionTokenizer._to_bytes() 自动处理 PIL Image 序列化"
  - "StreamingEngine._interrupt_event 实例级状态，支持持久化中断"
  - "FactChecker Mock: 相同文本使用 id 缓存保证 score ≈ 1.0"
  - "MessageResponse.hallucination_detected 默认 False，向后兼容旧测试"
