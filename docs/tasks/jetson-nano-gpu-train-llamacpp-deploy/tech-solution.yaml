meta:
  task_id: jetson-nano-gpu-train-llamacpp-deploy
  title: "Jetson Nano 8GB GPU 训练 Tri-Transformer 模型 + llama.cpp 部署"
  platform: backend-python
  version: "1.0"
  requirement_version: "1.0"
  created_at: "2026-04-28"
  risk_level: MEDIUM

design:
  summary: |
    适配 Jetson Nano 8GB（Maxwell GPU, CUDA 10.2, 8GB 共享内存）训练 Tri-Transformer 轻量配置模型，
    并使用 llama.cpp GGUF 量化格式部署推理服务。

    核心策略：
    1. 训练端：使用默认轻量配置（d_model=512, vocab=151936, ~325M参数），GaLoreAdamW + AMP(FP16) + gradient_accumulation=4
    2. 部署端：PyTorch 直接推理（保留三分支全功能）为主，llama.cpp GGUF 推理（仅 O-Transformer 单分支）为轻量备选
    3. GGUF 转换：仅转换 O-Transformer Streaming Decoder 分支（标准 causal decoder 结构），适配 llama.cpp 标准 LLM 转换
    4. FastAPI 后端：推理模式通过配置切换（pytorch_direct / llamacpp_gguf）

  architecture: |
    backend/app/model/
    ├── trainer.py                 [MODIFY] Jetson Nano 训练适配
    ├── tri_transformer.py         [KEEP] 无需修改
    ├── branches.py                [KEEP] 无需修改
    ├── jetson_device.py           [NEW] Jetson Nano 硬件检测与适配
    ├── gguf_converter.py          [NEW] PyTorch → GGUF 转换器（仅 O-Transformer 分支）

    backend/app/core/
    ├── config.py                  [MODIFY] 新增 Jetson/llama.cpp 配置项

    backend/app/services/
    ├── train/train_service.py     [MODIFY] GaLore 适配 Jetson Nano 内存限制
    ├── inference/llama_cpp_service.py  [NEW] llama.cpp 推理服务封装

    backend/app/api/v1/
    ├── model.py                   [MODIFY] 推理模式切换（pytorch / llamacpp）

    backend/scripts/
    ├── train.py                   [MODIFY] 新增 --jetson-nano 参数
    ├── install_jetson_deps.sh     [NEW] Jetson Nano 一键安装脚本
    ├── convert_to_gguf.py         [NEW] CLI GGUF 转换入口
    ├── build_llamacpp_jetson.sh   [NEW] llama.cpp Jetson Nano 编译脚本

    backend/configs/
    ├── jetson_nano_config.yaml    [NEW] Jetson Nano 训练预置配置

    docs/
    ├── PRD.md                     [MODIFY] 新增 §4.7.2 Jetson Nano 部署方案
    ├── agent/architecture.md       [MODIFY] 新增 Jetson Nano 架构图
    ├── agent/jetson_nano_guide.md  [NEW] Jetson Nano 开发指南
    ├── agent/llamacpp_deployment.md [NEW] llama.cpp 部署指南

  data_flow: |
    训练流程:
      detect_jetson_device() → 配置适配 → TriTransformerTrainer(GaLore+AMP+grad_accum) → checkpoint.pt

    GGUF 转换流程:
      checkpoint.pt → 提取 O-Transformer 权重 → HuggingFace safetensors 格式 → convert_hf_to_gguf.py → F16.gguf → llama-quantize → Q5_K_M.gguf

    推理流程 (pytorch_direct):
      FastAPI → InferenceService → TriTransformerModel.forward() → logits → 解码输出

    推理流程 (llamacpp_gguf):
      FastAPI → LlamaCppService → llama-cpp-python(Llama()) → generate() → 输出

