implementation_notes:
  - "jetson_device.py: 通过 subprocess 检测 Jetson Nano（读取 /etc/nv_tegra_release, nvidia-smi, /proc/meminfo）"
  - "jetson_device.py: detect_jetson_device() 返回 JetsonDeviceInfo(is_jetson, gpu_name, cuda_version, total_memory_gb, is_shared_memory)"
  - "jetson_device.py: get_memory_usage_pct() 返回当前 CPU+GPU 共享内存使用百分比"
  - "gguf_converter.py: 仅转换 O-Transformer Streaming Decoder 分支（标准 causal decoder），不转换 I/C 分支（非标准结构 llama.cpp 不支持）"
  - "gguf_converter.py: 转换流程：1) load checkpoint.pt, 2) extract o_branch streaming_decoder weights, 3) save as HuggingFace format, 4) run convert_hf_to_gguf.py, 5) quantize"
  - "gguf_converter.py: O-Transformer Streaming Decoder 作为独立 causal LM 转出，GGUF 元数据包含 tri_transformer.o_transformer 标记"
  - "trainer.py: 当检测到 Jetson Nano 时，自动设置 GradScaler(init_scale=1024)，batch_size=1，grad_accum=4"
  - "llama_cpp_service.py: 使用 llama-cpp-python 库，Llama(model_path, n_gpu_layers=0) CPU-only 推理"
  - "llama_cpp_service.py: 提供 generate(prompt, max_tokens) 和 chat(messages) 方法"
  - "config.py 新增 inference_mode: str = 'pytorch_direct' (可选 'llamacpp_gguf')"
  - "config.py 新增 llamacpp_model_path: Optional[str] = None"
  - "config.py 新增 jetson_memory_limit_pct: float = 0.85"
  - "build_llamacpp_jetson.sh: 需 patch 6 处源码（constexpr/__builtin_assume/bfloat16/CUDA arch/cmath/unistd），目标 arch 50 61"
  - "install_jetson_deps.sh: 安装 JetPack 4.6 PyTorch wheel (1.10/1.13), 编译 llama.cpp, 安装 llama-cpp-python"

validation:
  acceptance:
    - "AC1: detect_jetson_device() 在 Jetson Nano 上返回 is_jetson=True, cuda_version='10.2', total_memory_gb=8.0"
    - "AC2: detect_jetson_device() 在非 Jetson 环境上返回 is_jetson=False（不误检）"
    - "AC3: trainer.train() 在 Jetson Nano 模式下使用 GaLoreAdamW + AMP + grad_accum=4"
    - "AC4: GGUF 转换：checkpoint.pt → Q5_K_M.gguf，文件大小约 1.8GB（325M 参数模型）"
    - "AC5: LlamaCppService.generate() 返回非空字符串（mock 或真实 llama.cpp）"
    - "AC6: FastAPI /api/v1/model/infer 切换 inference_mode 后正确路由到对应推理服务"
    - "AC7: install_jetson_deps.sh 执行后 torch.cuda.is_available() 返回 True（在 Jetson Nano 上）"
    - "AC8: jetson_nano_config.yaml 被训练脚本正确加载并覆盖默认配置"
    - "AC9: 内存监控：训练时超 85% 共享内存使用触发 WARNING 日志"
    - "AC10: pytest test_jetson_device.py test_gguf_converter.py test_llama_cpp_service.py 全部通过"
  test_command: "cd backend && python -m pytest tests/test_jetson_device.py tests/test_gguf_converter.py tests/test_llama_cpp_service.py -v"
  lint_command: "cd backend && python -m flake8 app/model/jetson_device.py app/model/gguf_converter.py app/services/inference/llama_cpp_service.py --max-line-length=120"

risks:
  - id: "R1"
    description: "llama.cpp 在 aarch64 + CUDA 10.2 编译需 6 处源码 patch，可能随版本更新失效"
    mitigation: "使用固定版本 llama.cpp (b-4992 或相近), 提供 build_llamacpp_jetson.sh 脚本自动 patch"
    severity: medium

  - id: "R2"
    description: "O-Transformer 单分支 GGUF 推理丢失 I/C 分支的幻觉检测和控制能力"
    mitigation: "llamacpp_gguf 模式仅用于轻量部署场景, 默认推荐 pytorch_direct 模式保留全功能"
    severity: medium

  - id: "R3"
    description: "Jetson Nano 8GB 共享内存训练时内存溢出风险"
    mitigation: "GaLore(rank=64) + AMP + grad_accum=4 + 85%内存阈值 WARNING + 训练配置限制 batch=1"
    severity: low

  - id: "R4"
    description: "PyTorch for Jetson 版本限制（<=1.13.x）导致部分现代 API 不可用"
    mitigation: "使用 torch.cuda.amp (1.6+可用) 替代 torch.amp; 避免 torch.compile; 代码兼容 PyTorch 1.10+"
    severity: low
